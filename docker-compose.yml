version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./.env:/app/.env
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app/server
      - ./.env:/app/.env
      - C:/Block-Library:/Block-Library
    environment:
      - PYTHONUNBUFFERED=1
    command: python server/enhanced_api_bridge.py
